    <text x="85" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ff6b6b" text-anchor="middle">8</text>
    <text x="85" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#A8A098" text-anchor="middle">Live QC Metrics</text>
    <text x="85" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#354060" text-anchor="middle">Real-time tracking</text>

