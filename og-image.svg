<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080c10"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1c2128" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- DNA strand decoration (left) -->
  <g stroke="#3fb950" stroke-width="2" fill="none" opacity="0.3">
    <path d="M60 80 C90 120 90 160 60 200 C30 240 30 280 60 320 C90 360 90 400 60 440 C30 480 30 520 60 560"/>
    <path d="M100 80 C70 120 70 160 100 200 C130 240 130 280 100 320 C70 360 70 400 100 440 C130 480 130 520 100 560"/>
    <line x1="60" y1="120" x2="100" y2="120"/>
    <line x1="60" y1="200" x2="100" y2="200"/>
    <line x1="60" y1="280" x2="100" y2="280"/>
    <line x1="60" y1="360" x2="100" y2="360"/>
    <line x1="60" y1="440" x2="100" y2="440"/>
    <line x1="60" y1="520" x2="100" y2="520"/>
  </g>

  <!-- Main content area -->
  <!-- Logo mark -->
  <g transform="translate(200, 160)">
    <rect x="-18" y="-18" width="52" height="52" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M2 20c8-8 16 0 24-8" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M10 28c2-2.5 2.8-5 3-8" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M18 4c-2 2.5-2.8 5-3 8" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M2 12c8 8 16 0 24 8" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- OmicsLab wordmark -->
  <text x="260" y="178" font-family="system-ui,-apple-system,sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">Omics<tspan fill="#3fb950">Lab</tspan></text>
  <text x="261" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#8b949e" letter-spacing="2">SIMULATOR</text>

  <!-- Gradient accent line -->
  <rect x="200" y="240" width="500" height="3" rx="2" fill="url(#accent)"/>

  <!-- Headline -->
  <text x="200" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1.5">Learn Omics Workflows</text>
  <text x="200" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5">
    <tspan fill="white">by </tspan><tspan fill="#3fb950">Doing</tspan><tspan fill="white"> Them</tspan>
  </text>

  <!-- Subheadline -->
  <text x="200" y="420" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#8b949e">14 workflows · 40+ diseases · 20 real instruments · Free &amp; Offline</text>

  <!-- Trust badges -->
  <g transform="translate(200, 460)">
    <rect width="140" height="36" rx="18" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
    <text x="70" y="23" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="600">🌍 Designed for Africa</text>
  </g>
  <g transform="translate(356, 460)">
    <rect width="130" height="36" rx="18" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle" font-weight="600">⚡ Works Offline</text>
  </g>
  <g transform="translate(502, 460)">
    <rect width="130" height="36" rx="18" fill="#161b22" stroke="#bc8cff" stroke-width="1"/>
    <text x="65" y="23" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#bc8cff" text-anchor="middle" font-weight="600">🆓 Free Forever</text>
  </g>

  <!-- Right side: stats cards -->
  <g transform="translate(780, 100)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="170" height="90" rx="12" fill="url(#card)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="85" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#3fb950" text-anchor="middle">14</text>
    <text x="85" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Workflows</text>
    <text x="85" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3d444d" text-anchor="middle">WGS · RNA-seq · ATAC-seq…</text>

    <!-- Card 2 -->
    <rect x="200" y="0" width="170" height="90" rx="12" fill="url(#card)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="285" y="38" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#58a6ff" text-anchor="middle">40+</text>
    <text x="285" y="60" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Diseases</text>
    <text x="285" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3d444d" text-anchor="middle">Malaria · TB · Cancer…</text>

    <!-- Card 3 -->
    <rect x="0" y="115" width="170" height="90" rx="12" fill="url(#card)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="85" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#bc8cff" text-anchor="middle">20+</text>
    <text x="85" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Instruments</text>
    <text x="85" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3d444d" text-anchor="middle">NovaSeq · MinION…</text>

    <!-- Card 4 -->
    <rect x="200" y="115" width="170" height="90" rx="12" fill="url(#card)" stroke="#f97316" stroke-width="1.5"/>
    <text x="285" y="153" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#f97316" text-anchor="middle">5</text>
    <text x="285" y="175" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Languages</text>
    <text x="285" y="193" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3d444d" text-anchor="middle">EN · FR · SW · PT · AR</text>

    <!-- Card 5 -->
    <rect x="0" y="230" width="170" height="90" rx="12" fill="url(#card)" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="85" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#ff6b6b" text-anchor="middle">8</text>
    <text x="85" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Live QC Metrics</text>
    <text x="85" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3d444d" text-anchor="middle">Real-time tracking</text>

    <!-- Card 6 -->
    <rect x="200" y="230" width="170" height="90" rx="12" fill="url(#card)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="285" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#fbbf24" text-anchor="middle">54</text>
    <text x="285" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">African Countries</text>
    <text x="285" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#3d444d" text-anchor="middle">Built for all of Africa</text>

    <!-- Card 7: QC bar preview -->
    <rect x="0" y="345" width="370" height="110" rx="12" fill="url(#card)" stroke="#30363d" stroke-width="1.5"/>
    <text x="15" y="370" font-family="monospace" font-size="12" fill="#3fb950">$ bwa-mem2 mem -t 16 ref.fa sample.fastq</text>
    <text x="15" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Sample Integrity (RIN)</text>
    <rect x="15" y="398" width="280" height="8" rx="4" fill="#1c2128"/>
    <rect x="15" y="398" width="238" height="8" rx="4" fill="#3fb950"/>
    <text x="300" y="407" font-family="system-ui,sans-serif" font-size="11" fill="#3fb950" font-weight="600">8.5</text>
    <text x="15" y="425" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Q30 Score</text>
    <rect x="15" y="433" width="280" height="8" rx="4" fill="#1c2128"/>
    <rect x="15" y="433" width="252" height="8" rx="4" fill="#58a6ff"/>
    <text x="300" y="442" font-family="system-ui,sans-serif" font-size="11" fill="#58a6ff" font-weight="600">91%</text>
  </g>

  <!-- Bottom attribution -->
  <text x="200" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#3d444d">Built by Simon Mufara · UCT Computational Biology · simon-mufara.github.io/Omics-Lab</text>

  <!-- Right corner subtle branding -->
  <text x="1150" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#3d444d" text-anchor="end">Powered by Science ✦ Made for Africa</text>
</svg>
