    <text x="285" y="268" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="800" fill="#E3B341" text-anchor="middle">54</text>
    <text x="285" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#A8A098" text-anchor="middle">African Countries</text>
    <text x="285" y="308" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#354060" text-anchor="middle">Built for all of Africa</text>

