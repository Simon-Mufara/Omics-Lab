    <rect x="15" y="398" width="238" height="8" rx="4" fill="#00C4A0"/>
    <text x="300" y="407" font-family="system-ui,sans-serif" font-size="11" fill="#00C4A0" font-weight="600">8.5</text>
    <text x="15" y="425" font-family="system-ui,sans-serif" font-size="11" fill="#A8A098">Q30 Score</text>
    <rect x="15" y="433" width="280" height="8" rx="4" fill="#182236"/>
    <rect x="15" y="433" width="252" height="8" rx="4" fill="#58a6ff"/>
    <text x="300" y="442" font-family="system-ui,sans-serif" font-size="11" fill="#58a6ff" font-weight="600">91%</text>
