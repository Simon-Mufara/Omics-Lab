    <text x="15" y="370" font-family="'Courier New',monospace" font-size="12" fill="#00C4A0">$ bwa-mem2 mem -t 16 ref.fa sample.fastq</text>
    <text x="15" y="390" font-family="system-ui,sans-serif" font-size="11" fill="#A8A098">Sample Integrity (RIN)</text>
